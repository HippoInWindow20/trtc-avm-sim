<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        .stdBox {
            display: flex;
            flex-grow: 1;
            background-size: 100%;
            border-radius: 10px;
            background: #ffff75;
            margin: 0.5vw;
            padding: 3%;
            box-sizing: border-box;
        }

        .stdBlue {
            color: #282472;
            font-size: 6vw;
            font-weight: bolder;
            font-family: Helvetica, Arial, Noto Sans, Noto Sans TC;
            text-align: right;
            white-space: nowrap;
        }

        .stdRed {
            color: red;
            font-size: 5vw;
            font-weight: bolder;
            font-family: Helvetica, Arial, Noto Sans, Noto Sans TC;
            text-align: right;
            white-space: nowrap;
        }

        .stdBlk {
            color: black;
            font-size: 3vw;
            font-weight: bolder;
            font-family: Helvetica, Arial, Noto Sans, Noto Sans TC;
            text-align: right;
            white-space: nowrap;
        }

        .guideZH {
            color: red;
            font-size: 6vw;
            font-family: Helvetica, Arial, Noto Sans, Noto Sans TC;
            font-weight: bolder;
        }

        .guideEN {
            color: red;
            font-size: 4vw;
            font-family: Helvetica, Arial, Noto Sans, Noto Sans TC;

            font-weight: bolder;
        }

        white {
            color: white;
        }

        .btnCancel {
            height: 80%;
            aspect-ratio: 2;
            border-radius: 10000000px;
            border: none;
            float: right;
            background: url(images/cancel_btn_rect.svg);
            background-size: 100%;
            font-size: 0;
        }

        .btnCancel:active {
            background: url(images/cancel_btn_rect_prs.svg);
            background-size: 100%;
        }

        .btnNext {
            height: 80%;
            aspect-ratio: 2;
            border-radius: 10000000px;
            border: none;
            float: right;
            background: url(images/next_btn_rect.svg);
            background-size: 100%;
            font-size: 0;
        }

        .btnNext:active {
            background: url(images/next_btn_rect_prs.svg);
            background-size: 100%;
        }
    </style>
</head>

<body style="overflow: hidden;background: #49b4e2">
    <div style="width: 100%;aspect-ratio: 4/3;flex-direction: column;">
        <div style="height: 55%;text-align: left;display: flex;flex-direction: row;">
            <div style="display: flex;flex-direction: column;flex-grow: 1">
                <div class="stdBox" style="display: flex;flex-direction: row;flex-grow: 1;">
                    <div style="width: 100%;height: 100%;display: flex;flex-direction: row;align-items: center;">
                        <img style="width: 50%;" src="images/rem_bal.svg" />
                        <span id="initial_amount_dp" style="width: 43%;padding-right: 2%;" class="stdBlue">15</span>
                        <img style="width: 7%;" src="images/dollars_bl.svg" />
                    </div>
                </div>
                <div class="stdBox" style="display: flex;flex-direction: row;flex-grow: 1;">
                    <div style="width: 100%;height: 100%;display: flex;flex-direction: row;align-items: center;">
                        <img style="width: 50%;" src="images/amm_ins.svg" />
                        <span id="inserted_dp" style="width: 43%;padding-right: 2%;" class="stdBlue">15</span>
                        <img style="width:7%;" src="images/dollars_bl.svg" />
                    </div>
                </div>
                <div class="stdBox" style="display: flex;flex-direction: row;flex-grow: 1;padding: 1%;">
                    <div
                        style="width: 100%;height: 100%;display: flex;flex-direction: row;align-items: center;background-image: url('images/topup_hint.svg');background-size: 100%;">
                        <!-- <img style="width: 100%;" src="images/topup_hint.svg" /> -->
                        <span id="bills_dp" style="position: relative;top: 0;left: 39%" class="stdRed">15</span>
                        <span id="coins_dp" style="position: relative;top: 0;left: 63%" class="stdRed">20</span>
                    </div>
                </div>
            </div>
            <div style="display: flex;flex-direction: row;">
                <div class="stdBox" style="background-color: transparent;">
                    <img src="images/topup_guide.png" />
                </div>
            </div>
        </div>
        <div style="height: 40.3%;display: flex;flex-direction: column">
            <div style="text-align: center;display: flex;flex-direction: column;align-items: center;">
                <span class="guideZH">不再投入 請按「<white>下一步</white>」</span>
                <span class="guideEN">Press <white>"Next"</white> to continue</span>
            </div>
            <div style="display: flex;flex-direction: row;align-items: center;flex-grow: 0.8;">
                <button class="btnNext" onclick="next()" style="margin-left: 40%;"></button>
                <button class="btnCancel" onclick="goBack()"
                    style="margin-left: 5%;height: 70%;"></button>
            </div>
        </div>
        <div style="height: 5.5%;display: flex;flex-direction: row;">
            <div style="width: 50%;text-align: left;margin-top: 1.5dvh;">
                <span
                    style="font-size: 3.5dvh;font-family: Helvetica, Arial, sans-serif;font-weight: bold;color: black;">v3.0.6/
                    v30</span>
            </div>
            <div style="width: 50%;text-align: right;margin-top: 1.5dvh;">
                <span id="date"
                    style="font-size: 3.5dvh;font-family: Helvetica, Arial, sans-serif;font-weight: bold;color: #1b0b97;"></span>
            </div>
        </div>
    </div>
    <script>
        var initialAmount = undefined
        var inserted = 0
        var coins = 20
        var bills = 15

        var coinsList = [1, 5, 10, 20, 50]
        var billsList = [100, 200, 500, 1000, 2000]

        function setDt() {
            var d = new Date()
            document.getElementById("date").innerHTML = d.getFullYear() + "/" + twoNums(d.getMonth() + 1) + "/" + twoNums(d.getDate()) + " " + twoNums(d.getHours()) + ":" + twoNums(d.getMinutes()) + ":" + twoNums(d.getSeconds())
        }
        setDt()

        function twoNums(num) {
            if (num.toString().length == 1) {
                return "0" + num.toString()
            } else {
                return num.toString()
            }
        }
        function goBack() {
            window.parent.touchSound()
            setTimeout(
                function () {
                    window.location.href = "topup_cancel.html"
                }
                , 500)
        }
        setInterval(setDt, 1000)

        async function removeCard() {
            setTimeout(
                function () {
                    window.location.href = "topup_cancel.html"
                }
                , 500)
        }

        function insertAmount(amount) {
            if (coinsList.includes(parseInt(amount))) {
                if (coins > 0)
                    coins--
                else
                    throw new Error("Coins unavailable")
            } else if (billsList.includes(parseInt(amount))) {
                if (bills > 0)
                    bills--
                else
                    throw new Error("Bills unavailable")
            } else {
                throw new Error("Invalid currency")
            }

            if (parseInt(amount) < 0)
                return
            try {
                parseInt(amount)
            } catch (e) {
                console.error("Illegal amount")
                return
            }

            inserted += parseInt(amount)
            document.getElementById("inserted_dp").innerText = inserted
            document.getElementById("bills_dp").innerText = twoNums(bills)
            document.getElementById("coins_dp").innerText = twoNums(coins)
        }

        function next() {
            window.parent.touchSound()
            setTimeout(
                function () {
                    window.location.href = `topping_up.html?remaining=${initialAmount}&amount=${inserted}`
                }, 750
            )
        }


        const params = new URLSearchParams(window.location.search);
        initialAmount = parseInt(params.get("remaining"))
        document.getElementById("initial_amount_dp").innerText = params.get("remaining")
        insertAmount(parseInt(params.get("amount")))
    </script>
</body>

</html>
