    <style>
        .stdBox {
            display: flex;

        }

        .stdBlk {

        }

        .guideEN {
            color: red;

            font-family: Helvetica, Arial, Noto Sans, Noto Sans TC;

        }

        white {
            color: white;
        }

        .btnCancel {
            height: 80%;
            aspect-ratio: 2;
            border-radius: 10000000px;
            border: none;
            float: right;
            background: url(images/return_btn_rect.svg);
            background-size: 100%;
            font-size: 0;
        }

        .btnCancel:active {
            background: url(images/return_btn_rect_pressed.svg);
            background-size: 100%;
        }
    </style>
</head>

<body style="overflow: hidden;background: #49b4e2">

                        <img style="width: 30%;" src="images/fare_notice.svg" />

                </div>

            <div style="display: flex;flex-direction: row;">
                <div class="stdBox" style="background-color: transparent;">
                    <img src="images/topup_guide.png" />
                </div>
            </div>
        </div>
        <div style="height: 40.3%;display: flex;flex-direction: column">
            <div style="text-align: center;display: flex;flex-direction: column;align-items: center;">
                <span class="guideZH">不再投入 請按「<white>下一步</white>」</span>
                <span class="guideEN">Press <white>"Next"</white> to continue</span>
            </div>
            <div style="display: flex;flex-direction: row;align-items: center;flex-grow: 0.6;">
                <button id="btnReturn" class="btnCancel" onclick="goBack()" style="margin-left: 50%;"></button>
                <button id="btnReturn" class="btnCancel" onclick="goBack()" style="margin-left: 5%;height: 70%;"></button>
            </div>
        </div>
        <div style="height: 5.5%;display: flex;flex-direction: row;">
            <div style="width: 50%;text-align: left;margin-top: 1.5dvh;">
                <span
                    style="font-size: 3.5dvh;font-family: Helvetica, Arial, sans-serif;font-weight: bold;color: black;">v3.0.6/
                    v30</span>
            </div>
            <div style="width: 50%;text-align: right;margin-top: 1.5dvh;">
                <span id="date"
                    style="font-size: 3.5dvh;font-family: Helvetica, Arial, sans-serif;font-weight: bold;color: #1b0b97;"></span>
            </div>
        </div>
    </div>
    <script>
        var initialAmount = undefined

        function setDt() {
            var d = new Date()
            document.getElementById("date").innerHTML = d.getFullYear() + "/" + twoNums(d.getMonth() + 1) + "/" + twoNums(d.getDate()) + " " + twoNums(d.getHours()) + ":" + twoNums(d.getMinutes()) + ":" + twoNums(d.getSeconds())
        }
        setDt()

        function twoNums(num) {
            if (num.toString().length == 1) {
                return "0" + num.toString()
            } else {
                return num.toString()
            }
        }
        function goBack() {
            window.parent.touchSound()
            setTimeout(
                function () {
                    window.location.href = "home.html"
                }
                , 500)
        }
        setInterval(setDt, 1000)
        window.parent.narrate("process", "insert_bill")

        async function removeCard() {
            const url1 = `home.html`;
            const url2 = `pages/home.html`;

            try {
                const res = await fetch(url1, { method: "HEAD" });

                if (res.ok) {
                    window.location.href = url1;
                } else {
                    throw new Error("not ok");
                }
            } catch (e) {
                window.location.href = url2;
            }
        }

        const params = new URLSearchParams(window.location.search);
        initialAmount = parseInt(params.get("amount"))
        document.getElementById("initial_amount_dp").innerText = params.get("amount")

            // TODO
        }

        // TODO: Randomise stuff
    </script>
