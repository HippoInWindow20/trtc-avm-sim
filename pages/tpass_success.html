<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        .stdBox {
            display: flex;
            flex-grow: 1;
            aspect-ratio: 16/9;
            background-size: 100%;
            border: 0.5vw solid white;
            border-radius: 10px;
            background-color: lightgray;
            margin: 0.5vw;
        }

        .stdBlue {
            color: #282472;
            font-size: 4vw;
            font-weight: bolder;
            font-family: Helvetica, Arial, Noto Sans, Noto Sans TC;
            text-align: right;
            white-space: nowrap;
        }

        .stdBlk {
            color: black;
            font-size: 3vw;
            font-weight: bolder;
            font-family: Helvetica, Arial, Noto Sans, Noto Sans TC;
            text-align: right;
            white-space: nowrap;
        }

        .btnNext {
            height: 100%;
            aspect-ratio: 2;
            border-radius: 10000000px;
            border: none;
            float: right;
            background: url(images/receipt_btn.svg);
            background-size: 100%;
            font-size: 0;
            margin-left: 70%;
        }

        .btnNext:active {
            background: url(images/receipt_btn_prs.svg);
            background-size: 100%;
        }
    </style>
</head>

<body style="overflow: hidden;background-image: url('images/bg_tpass_success.svg');background-size: 100%;">
    <div style="width: 100%;aspect-ratio: 4/3;flex-direction: column;">
        <div style="height: 95.3%;text-align: left;display: flex;flex-direction: column">
            <div style="display: flex;flex-direction: row;">
                <div class="stdBox" style="background-image: url('images/summary_balance.svg');">
                    <div style="width: 100%;height: 100%;position: relative;">
                        <span class="stdBlue" style="position: absolute;top: 50%;right: 5%;">2038/01/01</span>
                        <span id="initial_amount_dp" class="stdBlue"
                            style="position: absolute;top: 75%;right: 15%;">-15</span>
                    </div>
                </div>

                <div class="stdBox" style="background-image: url('images/summary_special.svg');background-size: 100%;">
                    <div style="width: 100%;height: 100%;position: relative;">
                        <span class="stdBlk" style="position: absolute;top: 32%;left: 40%;color: red;">TPASS/都會通</span>
                        <span class="stdBlk" style="position: absolute;top: 55%;left: 40%;">2024/07/08</span>
                        <span class="stdBlk" style="position: absolute;top: 75%;left: 40%;">2024/08/07</span>
                    </div>
                </div>
            </div>
            <div style="display: flex;flex-direction: row;">
                <div class="stdBox"
                    style="background-color: transparent;border: 0.5vw solid transparent;background-image: url('images/tpass_done.svg');background-size: 100%;aspect-ratio: 16/5;">

                </div>
            </div>
            <div style="height: 20%;display: flex;flex-direction: column">
                <div style="display: flex;flex-direction: row;align-items: center;flex-grow: 0.8;">
                    <button id="btnReceipt" class="btnNext" onclick="receipt()"></button>
                </div>
            </div>
        </div>
        <div style="height: 5.5%;display: flex;flex-direction: row;">
            <div style="width: 50%;text-align: left;margin-top: 1.5dvh;">
                <span
                    style="font-size: 3.5dvh;font-family: Helvetica, Arial, sans-serif;font-weight: bold;color: black;">v3.0.6/
                    v30</span>
            </div>
            <div style="width: 50%;text-align: right;margin-top: 1.5dvh;">
                <span id="date"
                    style="font-size: 3.5dvh;font-family: Helvetica, Arial, sans-serif;font-weight: bold;color: #1b0b97;"></span>
            </div>
        </div>
    </div>
    <script>
        function setDt() {
            var d = new Date()
            document.getElementById("date").innerHTML = d.getFullYear() + "/" + twoNums(d.getMonth() + 1) + "/" + twoNums(d.getDate()) + " " + twoNums(d.getHours()) + ":" + twoNums(d.getMinutes()) + ":" + twoNums(d.getSeconds())
        }
        setDt()

        function twoNums(num) {
            if (num.toString().length == 1) {
                return "0" + num.toString()
            } else {
                return num.toString()
            }
        }
        setInterval(setDt, 1000)

        const params = new URLSearchParams(window.location.search);
        document.getElementById("initial_amount_dp").innerText = params.get("final")
        window.parent.document.getElementById("card_remaining").value = parseInt(params.get("final"))

        function receipt() {
            window.parent.touchSound()
            setTimeout(
                function () {
                    window.location.href = "home.html"
                }
                , 1000)
        }

        setTimeout(
            function () {
                window.location.href = "home.html"
            }
            , 10000)

        function removeCard () {}
        // TODO: Randomise stuff
    </script>
</body>

</html>
