<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        .stdBox {
            display: flex;
            flex-grow: 1;
            background-size: 100%;
            border-radius: 10px;
            background: #ffff75;
            margin: 0.5vw;
            padding: 3%;
            box-sizing: border-box;
        }

        .stdBlue {
            color: #282472;
            font-size: 6vw;
            font-weight: bolder;
            font-family: Helvetica, Arial, Noto Sans, Noto Sans TC;
            text-align: right;
            white-space: nowrap;
        }

        .stdRed {
            color: red;
            font-size: 6vw;
            font-weight: bolder;
            font-family: Helvetica, Arial, Noto Sans, Noto Sans TC;
            text-align: right;
            white-space: nowrap;
        }

        .stdBlk {
            color: black;
            font-size: 3vw;
            font-weight: bolder;
            font-family: Helvetica, Arial, Noto Sans, Noto Sans TC;
            text-align: right;
            white-space: nowrap;
        }

        .guideZH {
            color: red;
            font-size: 6vw;
            font-family: Helvetica, Arial, Noto Sans, Noto Sans TC;
            font-weight: bolder;
        }

        .guideEN {
            color: red;
            font-size: 4vw;
            font-family: Helvetica, Arial, Noto Sans, Noto Sans TC;

            font-weight: bolder;
        }

        white {
            color: white;
        }

        .btnCancel {
            height: 70%;
            aspect-ratio: 2;
            border-radius: 10000000px;
            border: none;
            float: right;
            background: url(images/return_btn_rect.svg);
            background-size: 100%;
            font-size: 0;
            margin-left: 5%;
            display: none;
        }

        .btnCancel:active {
            background: url(images/return_btn_rect_pressed.svg);
            background-size: 100%;
        }

        .btnNext {
            height: 70%;
            aspect-ratio: 2;
            border-radius: 10000000px;
            border: none;
            float: right;
            background: url(images/receipt_btn.svg);
            background-size: 100%;
            font-size: 0;
            margin-left: 55%;
            display: none;
        }

        .btnNext:active {
            background: url(images/receipt_btn_prs.svg);
            background-size: 100%;
        }
    </style>
</head>

<body style="overflow: hidden;background-image: url('images/bg_topup_success.svg');background-size: 100%;">
    <div style="width: 100%;aspect-ratio: 4/3;flex-direction: column;">
        <div style="height: 55%;text-align: left;display: flex;flex-direction: row;">
            <div style="display: flex;flex-direction: column;flex-grow: 1.2">
                <div class="stdBox" style="display: flex;flex-direction: row;flex-grow: 1;">
                    <div style="width: 100%;height: 100%;display: flex;flex-direction: row;align-items: center;">
                        <img style="width: 50%;" src="images/success_original.svg" />
                        <span id="initial_amount_dp" style="width: 43%;padding-right: 2%;" class="stdBlue">15</span>
                        <img style="width: 7%;" src="images/dollars_bl.svg" />
                    </div>
                </div>
                <div class="stdBox" style="display: flex;flex-direction: row;flex-grow: 1;">
                    <div style="width: 100%;height: 100%;display: flex;flex-direction: row;align-items: center;">
                        <img style="width: 50%;" src="images/success_add.svg" />
                        <span id="inserted_dp" style="width: 43%;padding-right: 2%;" class="stdBlue">15</span>
                        <img style="width:7%;" src="images/dollars_bl.svg" />
                    </div>
                </div>
                <div class="stdBox" style="display: flex;flex-direction: row;flex-grow: 1;">
                    <div style="width: 100%;height: 100%;display: flex;flex-direction: row;align-items: center;">
                        <img style="width: 50%;" src="images/success_current.svg" />
                        <span id="final_amount_dp" style="width: 43%;padding-right: 2%;" class="stdBlue">15</span>
                        <img style="width: 7%;" src="images/dollars_bl.svg" />
                    </div>
                </div>
            </div>
            <div style="display: flex;flex-direction: row;">
                <div class="stdBox" style="background-color: transparent;">
                    <img src="images/return.png" />
                </div>
            </div>
        </div>
        <div style="height: 20.3%;display: flex;flex-direction: column"></div>
        <div style="height: 20%;display: flex;flex-direction: column">
            <div style="display: flex;flex-direction: row;align-items: center;flex-grow: 0.8;">
                <button id="btnReceipt" class="btnNext"></button>
                <button id="btnReturn" class="btnCancel" onclick="goBack()"></button>
            </div>
        </div>
        <div style="height: 5.5%;display: flex;flex-direction: row;">
            <div style="width: 50%;text-align: left;margin-top: 1.5dvh;">
                <span
                    style="font-size: 3.5dvh;font-family: Helvetica, Arial, sans-serif;font-weight: bold;color: black;">v3.0.6/
                    v30</span>
            </div>
            <div style="width: 50%;text-align: right;margin-top: 1.5dvh;">
                <span id="date"
                    style="font-size: 3.5dvh;font-family: Helvetica, Arial, sans-serif;font-weight: bold;color: #1b0b97;"></span>
            </div>
        </div>
    </div>
    <script>
        window.parent.narrate("process", "topup_success")
        setTimeout(function () {
            document.getElementById("btnReceipt").style.display = "block"
            document.getElementById("btnReturn").style.display = "block"
        }, 3200)


        function setDt() {
            var d = new Date()
            document.getElementById("date").innerHTML = d.getFullYear() + "/" + twoNums(d.getMonth() + 1) + "/" + twoNums(d.getDate()) + " " + twoNums(d.getHours()) + ":" + twoNums(d.getMinutes()) + ":" + twoNums(d.getSeconds())
        }
        setDt()

        function twoNums(num) {
            if (num.toString().length == 1) {
                return "0" + num.toString()
            } else {
                return num.toString()
            }
        }
        function goBack() {
            window.parent.touchSound()
            setTimeout(
                function () {
                    window.location.href = "home.html"
                }
                , 500)
        }
        setInterval(setDt, 1000)

        function removeCard() { }

        const params = new URLSearchParams(window.location.search);
        document.getElementById("initial_amount_dp").innerText = params.get("remaining")
        document.getElementById("inserted_dp").innerText = params.get("amount")
        document.getElementById("final_amount_dp").innerText = parseInt(params.get("remaining")) + parseInt(params.get("amount"))
        window.parent.document.getElementById("card_remaining").value = parseInt(params.get("remaining")) + parseInt(params.get("amount"))

        setTimeout(function () {
            window.location.href = "home.html"
        }, 10000)
    </script>
</body>

</html>
