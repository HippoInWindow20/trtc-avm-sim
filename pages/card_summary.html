<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        .stdBox {
            display: flex;
            flex-grow: 1;
            aspect-ratio: 16/9;
            background-size: 100%;
            border: 3px solid white;
            border-radius: 10px;
            background-color: lightgray;
            margin: 5px;
        }
    </style>
</head>

<body style="overflow: hidden;background: #49b4e2">
    <div style="width: 100%;aspect-ratio: 4/3;flex-direction: column;">
        <div style="height: 95.3%;text-align: left;display: flex;flex-direction: column">
            <div style="display: flex;flex-direction: row;">
                <div class="stdBox"
                    style="background-image: url('images/summary_balance.svg');">
                    
                </div>
                <div class="stdBox"
                    style="background-image: url('images/summary_last.svg');background-size: 100%;">
                    
                </div>
            </div>
            <div style="display: flex;flex-direction: row;">
                <div class="stdBox"
                    style="background-color: transparent;background-image: url('images/summary_guide.svg');background-size: 100%;">
                    
                </div>
                <div class="stdBox" style="background-image: url('images/summary_special.svg');background-size: 100%;">
                    
                </div>
            </div>
        </div>
        <div style="height: 5.5%;display: flex;flex-direction: row;">
            <div style="width: 50%;text-align: left;margin-top: 1.5dvh;">
                <span
                    style="font-size: 3.5dvh;font-family: Helvetica, Arial, sans-serif;font-weight: bold;color: black;">v3.0.6/
                    v30</span>
            </div>
            <div style="width: 50%;text-align: right;margin-top: 1.5dvh;">
                <span id="date"
                    style="font-size: 3.5dvh;font-family: Helvetica, Arial, sans-serif;font-weight: bold;color: #1b0b97;"></span>
            </div>
        </div>
    </div>
    <script>

        function setDt() {
            var d = new Date()
            document.getElementById("date").innerHTML = d.getFullYear() + "/" + twoNums(d.getMonth() + 1) + "/" + twoNums(d.getDate()) + " " + twoNums(d.getHours()) + ":" + twoNums(d.getMinutes()) + ":" + twoNums(d.getSeconds())
        }
        setDt()

        function twoNums(num) {
            if (num.toString().length == 1) {
                return "0" + num.toString()
            } else {
                return num.toString()
            }
        }
        function goBack() {
            window.parent.touchSound()
            setTimeout(
                function () {
                    window.location.href = "home.html"
                }
                , 500)
        }
        setInterval(setDt, 1000)
        window.parent.narrate("process", "insert_bill")

        async function removeCard () {
            const url1 = `home.html`;
            const url2 = `pages/home.html`;

            try {
                const res = await fetch(url1, { method: "HEAD" });

                if (res.ok) {
                    window.location.href = url1;
                } else {
                    throw new Error("not ok");
                }
            } catch (e) {
                window.location.href = url2;
            }
        }
    </script>
</body>

</html>
